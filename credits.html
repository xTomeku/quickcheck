    <style>
        .credits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;

        .credit-category {

            text-align: center;

        .credit-category h2 {
            color: var(--primary-gold);

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-main">
            <button class="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>

            <a href="index.html" class="nav-brand">

    <!-- Main Content -->

        <div class="page-header">
            <h1 class="reveal">Riconoscimenti</h1>
            <p class="reveal delay-1">Le persone e i progetti che hanno reso possibile QuickCheck.</p>
        </div>

        <div id="credits-container">
            <!-- Dynamic Content -->
            <p style="text-align: center; color: var(--text-muted);">Caricamento riconoscimenti...</p>

        </section>
